<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tommy Skarda's Games</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #1a1a1a;
    color: #e0e0e0;
    font-family: system-ui, sans-serif;
    padding: 40px 20px;
    box-sizing: border-box;
  }
  h1 {
    margin: 0 0 8px;
    font-weight: 500;
    letter-spacing: 3px;
    font-size: 36px;
  }
  p.tagline {
    margin: 0 0 40px;
    color: #aaa;
    letter-spacing: 1px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
    width: 100%;
    max-width: 900px;
  }
  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 32px 20px;
    background: #0f0f0f;
    border: 2px solid #333;
    color: #e0e0e0;
    text-decoration: none;
    transition: border-color 0.15s, transform 0.15s;
    text-align: center;
  }
  .card:hover {
    border-color: #3ddc6b;
    transform: translateY(-2px);
  }
  .card .icon {
    font-size: 48px;
    line-height: 1;
  }
  .card .name {
    font-size: 20px;
    font-weight: 500;
    letter-spacing: 1px;
  }
  .card .desc {
    font-size: 13px;
    color: #888;
  }
  .card.coming-soon {
    opacity: 0.4;
    cursor: not-allowed;
    pointer-events: none;
  }
  footer {
    margin-top: 60px;
    color: #555;
    font-size: 12px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
  <h1>TOMMY SKARDA'S GAMES</h1>
  <p class="tagline">pick a game</p>

  <div class="grid">
    <a class="card" href="SnakeGame/index.html">
      <div class="icon">&#x1F40D;</div>
      <div class="name">Snake</div>
      <div class="desc">classic arcade</div>
    </a>

    <div class="card coming-soon">
      <div class="icon">&#x2728;</div>
      <div class="name">Coming Soon</div>
      <div class="desc">more games on the way</div>
    </div>
  </div>

  <footer>tommy skarda's games</footer>
</body>
</html>
